spring:
  application:
    name: gsrp-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/gsrp_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # Multipart file upload limits
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:15MB}

# Application-level file storage config
app:
  file:
    upload-dir: ${FILE_UPLOAD_DIR:./uploads/documents}

# JWT configuration
jwt:
  secret: ${JWT_SECRET:changeThisJwtSecretKeyBeforeProductionDeployment123}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

info:
  app:
    name: Government Service Request Platform
    description: Backend API for citizens, service agents, and administrators.
    version: 1.0.0
